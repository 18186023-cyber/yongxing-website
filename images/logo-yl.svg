<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002B5B"/>
      <stop offset="100%" style="stop-color:#1a5f7a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#002B5B" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- 六边形背景 -->
  <polygon points="100,5 195,52.5 195,147.5 100,195 5,147.5 5,52.5" 
           fill="url(#bgGrad)" 
           filter="url(#shadow)"/>
  
  <!-- 装饰边框 -->
  <polygon points="100,15 185,57.5 185,142.5 100,185 15,142.5 15,57.5" 
           fill="none" 
           stroke="#FFD700" 
           stroke-width="2" 
           opacity="0.6"/>
  
  <!-- Y&L 文字 -->
  <text x="100" y="115" 
        font-family="Arial, sans-serif" 
        font-size="70" 
        font-weight="bold" 
        fill="#FFD700" 
        text-anchor="middle"
        letter-spacing="3">Y&amp;L</text>
  
  <!-- 底部小字 -->
  <text x="100" y="165" 
        font-family="Arial, sans-serif" 
        font-size="10" 
        fill="#FFD700" 
        text-anchor="middle"
        opacity="0.8">YONGXING</text>
</svg>